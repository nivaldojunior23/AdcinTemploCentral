# =======================================================
# netlify.toml — Configurações de Cache para Performance
# =======================================================

# Imagens: cache de 1 ano no CDN (elas raramente mudam)
[[headers]]
  for = "/public/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/public/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/public/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/public/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SVGs e ícones: cache de 1 ano
[[headers]]
  for = "/public/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CSS e JS: cache de 1 dia (podem mudar com updates)
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

# HTML: sem cache longo (sempre busca a versão mais recente)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
