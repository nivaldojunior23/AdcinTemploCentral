# =======================================================
# netlify.toml — Configurações de Build para Next.js (Netlify)
# =======================================================

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.youtube.com https://s.ytimg.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: blob: https://i.ytimg.com https://img.youtube.com https://adcintemplocentral.com.br; font-src 'self' data: https://cdnjs.cloudflare.com; frame-src 'self' https://www.youtube.com https://www.google.com; frame-ancestors 'self'; connect-src 'self' https://www.youtube.com; object-src 'none'; upgrade-insecure-requests;"

